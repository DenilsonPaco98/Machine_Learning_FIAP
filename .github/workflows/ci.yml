name: CI - Tests & Security

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  actions: read
  id-token: write

jobs:
  unit-tests:
    name: Unit Tests & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-cov

      - name: Run tests with coverage
        id: pytest
        run: |
          pytest tests/ -q --maxfail=1 --disable-warnings --cov=src --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.python.version=3.10
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml

  security-scans:
    name: Security Scans (Semgrep, Trivy, Gitleaks, pip-audit, actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: 'p/ci'

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif || ''

      - name: Actionlint (validate GH workflows)
        run: |
          docker run --rm -v ${{ github.workspace }}:/workdir -w /workdir rhysd/actionlint:latest actionlint || true

      - name: Trivy - Filesystem scan (vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          format: 'sarif'
          output: 'trivy.sarif'
          scan-type: 'fs'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif || ''

      - name: pip-audit (dependency vulnerability scan)
        uses: pypa/gh-action-pip-audit@v1
        with:
          args: --output-format json --output-file pip_audit.json || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip_audit.json

      - name: Gitleaks - Secret detection
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --redact --report-format sarif --report-path gitleaks.sarif || ''

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif || ''

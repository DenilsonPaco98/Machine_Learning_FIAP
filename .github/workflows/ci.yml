name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  actions: read
  id-token: write

jobs:
  test-and-scan:
    name: Test, Coverage & Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --maxfail=1 --disable-warnings --cov=src --cov-report=xml:coverage.xml

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v2
        with:
          config: 'p/ci'
        # If you have SEMGREP_APP_TOKEN set as a secret it will send to semgrep.dev

      - name: Upload SARIF (Semgrep)
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif || ''

      - name: Run GHA Scanner (workflow scan)
        uses: raajheshkannaa/gha-scanner@v1
        with:
          annotate: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.10
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Upload Semgrep SARIF to Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif || ''

  gate-check:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - name: Wait for SonarCloud Quality Gate
        uses: sonarsource/sonarcloud-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

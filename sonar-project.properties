# SonarCloud configuration
## SonarCloud configuration
# Replace the placeholders below with values from your SonarCloud project
sonar.projectKey=your_org_your_project_key  # <-- replace with SONAR project key
sonar.organization=your_sonar_organization  # <-- replace with SonarCloud organization
sonar.projectName=tech-challenge-fase01
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.10
sonar.coverage.reportPaths=coverage.xml

# Exclusions: data, models, artifacts and MLflow runs
sonar.exclusions=data/**,models/**,mlruns/**,__pycache__/**

# Notes:
# - After importing the repository into SonarCloud, update sonar.projectKey and sonar.organization
# - The CI workflow expects coverage.xml to be generated at repository root

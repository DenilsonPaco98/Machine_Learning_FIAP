name: Security Scheduled Scans

on:
  schedule:
    - cron: '0 2 * * *' # diário às 02:00 UTC
  workflow_dispatch: {}

jobs:
  semgrep-scan:
    name: Semgrep Full Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (full ruleset)
        uses: returntocorp/semgrep-action@v2
        with:
          config: 'p/security-audit,p/python,p/owasp-top-ten'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif || ''

  gha-scanner:
    name: GHA Scanner Full
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GHA Scanner
        uses: raajheshkannaa/gha-scanner@v1
        with:
          annotate: true
